version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: autocomplete_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mydb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: autocomplete_api
    restart: always
    ports:
      - "8019:8019"
    environment:
      - DATABASE_URL=postgresql://gbuser:aidev123@217.217.249.121:5432/auto_complete
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
